name: Run tests

on:
  pull_request:
    branches:
      - main

jobs:
  eslint-wiggles:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./wiggles
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./wiggles/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

        

